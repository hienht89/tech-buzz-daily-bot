name = "techbuzz-bot"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# ────────────────────────────────────────────────────────────────────────────
# CRON: chạy MỖI GIỜ từ 7h sáng đến 0h đêm Việt Nam (UTC+7) → 18 bài/ngày
# UTC 00,01,02,...,17 → VN 07,08,09,...,23,00
# Bài đầu tiên: 07:00 VN. Bài cuối: 00:00 VN (nửa đêm).
# Cloudflare Cron có độ chính xác trong vài giây.
# ────────────────────────────────────────────────────────────────────────────
[triggers]
crons = ["0 0-17 * * *"]

# ────────────────────────────────────────────────────────────────────────────
# KV: lưu lịch sử các URL đã đăng (thay thế posted.json)
# Sau khi tạo bằng `pnpm run kv:create`, dán ID vào dòng `id = "..."` bên dưới.
# ────────────────────────────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "POSTED_KV"
id = "70ab341227fd4badb90dfa2d761dde32"

# ────────────────────────────────────────────────────────────────────────────
# VARS không nhạy cảm (nhạy cảm dùng `wrangler secret put`)
# ────────────────────────────────────────────────────────────────────────────
[vars]
TELEGRAM_CHANNEL_ID = "@techbuzz_daily"
TELEGRAM_SIGNATURE = "Tech Buzz Daily"
TELEGRAM_SIGNATURE_EMOJI = "🐝"
