name = "techbuzz-bot"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# ────────────────────────────────────────────────────────────────────────────
# CRON: chạy MỖI 2 GIỜ từ 7h sáng đến 23h đêm Việt Nam (UTC+7) → 9 bài/ngày
# UTC 00,02,04,06,08,10,12,14,16 → VN 07,09,11,13,15,17,19,21,23
# Bài đầu tiên: 07:00 VN. Bài cuối: 23:00 VN.
#
# Lý do giảm từ 18 → 9 bài/ngày (Phase 15, Apr 2026):
#   - 18 bài/ngày bắt bot phải "lấp slot" bằng candidate score thấp.
#   - Free Gemini quota hẹp; ít tick hơn → mỗi tick có nhiều "ngân sách" AI hơn,
#     ít risk fallback chain bị cạn cùng lúc.
#   - 9 bài/ngày vẫn đủ daily-news cadence cho channel; ưu tiên CHẤT > LƯỢNG.
# Quota mỗi bucket vẫn cap 18 (xem `bucket.ts`) → cap chặn category dominate
# nhưng KHÔNG ép phải lấp đủ; nếu candidate < MIN_SCORE_THRESHOLD thì skip slot.
#
# Cloudflare Cron có độ chính xác trong vài giây.
# ────────────────────────────────────────────────────────────────────────────
[triggers]
crons = ["0 0,2,4,6,8,10,12,14,16 * * *"]

# ────────────────────────────────────────────────────────────────────────────
# KV: lưu lịch sử các URL đã đăng (thay thế posted.json)
# Sau khi tạo bằng `pnpm run kv:create`, dán ID vào dòng `id = "..."` bên dưới.
# ────────────────────────────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "POSTED_KV"
id = "70ab341227fd4badb90dfa2d761dde32"

# ────────────────────────────────────────────────────────────────────────────
# VARS không nhạy cảm (nhạy cảm dùng `wrangler secret put`)
# ────────────────────────────────────────────────────────────────────────────
[vars]
TELEGRAM_CHANNEL_ID = "@techbuzz_daily"
TELEGRAM_SIGNATURE = "Tech Buzz Daily"
TELEGRAM_SIGNATURE_EMOJI = "🐝"
