name = "techbuzz-bot"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# ────────────────────────────────────────────────────────────────────────────
# CRON: chạy MỖI 1 GIỜ → 24 tick/ngày (Phase 18, Apr 29 2026).
#
# Lịch sử:
#   - Pre-Phase 15: mỗi 1 giờ × 18 tick (07–23 VN). 18 bài/ngày.
#   - Phase 15 (Apr 28 2026): giảm xuống mỗi 2h × 9 tick để ưu tiên CHẤT.
#   - Phase 18 (Apr 29 2026): tăng trở lại mỗi 1h × 24 tick.
#
# Lý do tăng (Phase 18):
#   - Phase 15 + 16 + 17 đã thắt scoring/dedup/threshold rất chặt → bài rác
#     đã bị lọc ngay ở filter/score, không cần ép cron thưa để "bù chất".
#   - 9 tick/ngày + skip-low-score → thực tế chỉ post 3-6 bài/ngày, ít hơn
#     daily-news cadence kỳ vọng cho channel.
#   - 24 tick/ngày: trần 24 bài; nếu MIN_SCORE_THRESHOLD vẫn chặn ~50% thì
#     vẫn ra 12-15 bài/ngày — đúng cadence "1 bài / vài giờ" cho dân tech VN.
#   - Free Gemini quota: với 6-key rotation + circuit breaker mạnh hơn (Phase 18)
#     pipeline AI đã chịu được tần suất 1h/tick.
#
# Quota mỗi bucket vẫn cap 18 (xem `bucket.ts`) → cap chặn category dominate
# nhưng KHÔNG ép phải lấp đủ; nếu candidate < MIN_SCORE_THRESHOLD thì skip slot.
#
# Cloudflare Cron có độ chính xác trong vài giây.
# ────────────────────────────────────────────────────────────────────────────
[triggers]
crons = ["0 * * * *"]

# ────────────────────────────────────────────────────────────────────────────
# KV: lưu lịch sử các URL đã đăng (thay thế posted.json)
# Sau khi tạo bằng `pnpm run kv:create`, dán ID vào dòng `id = "..."` bên dưới.
# ────────────────────────────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "POSTED_KV"
id = "70ab341227fd4badb90dfa2d761dde32"

# ────────────────────────────────────────────────────────────────────────────
# VARS không nhạy cảm (nhạy cảm dùng `wrangler secret put`)
# ────────────────────────────────────────────────────────────────────────────
[vars]
TELEGRAM_CHANNEL_ID = "@techbuzz_daily"
TELEGRAM_SIGNATURE = "Tech Buzz Daily"
TELEGRAM_SIGNATURE_EMOJI = "🐝"
