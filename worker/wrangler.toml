name = "techbuzz-bot"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

# ────────────────────────────────────────────────────────────────────────────
# CRON: 18 tick/ngày — đúng 1 tick/giờ từ 7h sáng đến 0h khuya VN
# (Phase 19.6, Apr 30 2026).
#
# UTC↔VN: VN = UTC+7. 7h VN = 0h UTC, 8h VN = 1h UTC, ..., 0h VN = 17h UTC.
# Cron `0 0-17 * * *` = mỗi giờ tròn từ 0h UTC đến 17h UTC = 18 tick.
#
# Lịch sử:
#   - Pre-Phase 15: 1h × 18 tick (07–23 VN). 18 bài/ngày — cadence cũ.
#   - Phase 15 (Apr 28 2026): giảm 2h × 9 tick để ưu tiên CHẤT.
#   - Phase 18 (Apr 29 2026): tăng lại 1h × 24 tick (cả đêm).
#   - Phase 19.6 (Apr 30 2026): user yêu cầu ĐÚNG 18 bài/ngày, không miss
#     slot, và không post đêm 1h-6h sáng VN. Đổi sang 18 tick 0-17 UTC,
#     đồng thời bỏ skip-low-score gate trong code (xem `index.ts`).
#
# Triết lý mới (Phase 19.6): "Always-post" — mỗi tick luôn cố post bài tốt
# nhất hiện có từ pool đã qua 4 lớp filter (tech URL + tech title + arxiv
# strict + dedup). KHÔNG bỏ slot vì score thấp nữa. Trade-off: đôi khi giờ
# tin yếu (10h-14h trưa VN = đêm Mỹ) có bài chỉ chất lượng trung bình, nhưng
# vẫn không phải bài rác.
#
# Cloudflare Cron có thể trễ 1-3 phút so với giây 0 — giới hạn nền tảng.
# ────────────────────────────────────────────────────────────────────────────
[triggers]
crons = ["0 0-17 * * *"]

# ────────────────────────────────────────────────────────────────────────────
# KV: lưu lịch sử các URL đã đăng (thay thế posted.json)
# Sau khi tạo bằng `pnpm run kv:create`, dán ID vào dòng `id = "..."` bên dưới.
# ────────────────────────────────────────────────────────────────────────────
[[kv_namespaces]]
binding = "POSTED_KV"
id = "70ab341227fd4badb90dfa2d761dde32"

# ────────────────────────────────────────────────────────────────────────────
# VARS không nhạy cảm (nhạy cảm dùng `wrangler secret put`)
# ────────────────────────────────────────────────────────────────────────────
[vars]
TELEGRAM_CHANNEL_ID = "@techbuzz_daily"
TELEGRAM_SIGNATURE = "Tech Buzz Daily"
TELEGRAM_SIGNATURE_EMOJI = "🐝"
