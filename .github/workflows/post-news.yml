name: Post Tech News to Telegram (DEPRECATED — manual only)

# ─────────────────────────────────────────────────────────────────────────────
# ⚠️  DEPRECATED: lịch chạy tự động (cron) ĐÃ TẮT.
#
# Bot chính giờ chạy trên Cloudflare Workers (worker/) với cron mỗi giờ.
# Workflow này chỉ giữ lại để chạy thủ công khi cần khẩn cấp (vd: CF Workers
# downtime). KHÔNG bao giờ bật lại `schedule` ở dưới — sẽ chạy SONG SONG với
# Cloudflare Worker, và 2 storage backend khác nhau (posted.json vs KV) sẽ
# KHÔNG đồng bộ → post TRÙNG bài lên kênh.
#
# Cách chạy thủ công: tab Actions → workflow này → "Run workflow".
# Trước khi chạy: TẠM TẮT cron Cloudflare Worker (`wrangler triggers ...` hoặc
# remove cron trong wrangler.toml + redeploy) để tránh dupe.
# ─────────────────────────────────────────────────────────────────────────────

on:
  # schedule: ĐÃ TẮT — xem lý do ở comment trên.
  workflow_dispatch:

permissions:
  contents: write # Cần để commit posted.json về repo (chỉ khi chạy manual)

concurrency:
  group: post-news
  cancel-in-progress: false

jobs:
  post:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run bot
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
          TELEGRAM_SIGNATURE: ${{ secrets.TELEGRAM_SIGNATURE }}
        run: pnpm --filter @workspace/scripts run post-news

      - name: Commit posted history
        if: always()
        run: |
          set -e
          git config user.name "tech-buzz-bot"
          git config user.email "bot@techbuzz.local"

          if [[ -z "$(git status --porcelain scripts/data/posted.json)" ]]; then
            echo "No new posts to commit"
            exit 0
          fi

          git add scripts/data/posted.json
          git commit -m "chore: update posted history [skip ci]"

          for attempt in 1 2 3 4 5; do
            if git push; then
              echo "Push thành công ở lần thử $attempt"
              exit 0
            fi
            echo "Push lần $attempt thất bại, pull --rebase rồi thử lại..."
            git pull --rebase --autostash origin "$GITHUB_REF_NAME" || true
            sleep $((attempt * 3))
          done

          echo "::error::Không push được posted.json sau 5 lần thử."
          exit 1
